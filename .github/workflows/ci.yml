name: CI

on:
  push:
    branches: [main, production]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres: # used by the migrations round-trip and integration tests below
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: bibseller_test
        ports: ['54320:5432'] # 54320 = the dev-default host port (#159)
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # S3_* env is not set: config.Load()'s dev defaults already match the
      # throwaway MinIO container below, and EnsureBucket creates the bucket.
      DATABASE_URL: postgres://postgres:dev@localhost:54320/bibseller_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: golangci-lint # includes govet via the standard linter group
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: backend
      - name: migrations round-trip (up -> 0 -> up)
        run: |
          GOOSE="go run github.com/pressly/goose/v3/cmd/goose@v3.27.1"
          $GOOSE -dir db/migrations postgres "$DATABASE_URL" up
          $GOOSE -dir db/migrations postgres "$DATABASE_URL" down-to 0
          $GOOSE -dir db/migrations postgres "$DATABASE_URL" up
      - name: start minio (object storage for the chat image tests)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 1
          done
          curl -sf http://localhost:9000/minio/health/live # fail the step if MinIO never came up
      - run: go test ./... # includes schema constraint tests against the migrated service DB
      - name: sqlc generated code is current
        working-directory: . # the target cds into backend itself
        run: make sqlc-check
      - name: govulncheck (known vulnerabilities in called code)
        # Pinned like the repo's other `go run` tools (goose/sqlc in the
        # Makefile); bump deliberately, not @latest.
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # End-to-end policy-matrix assertions (D6): boots the real API + frontend
  # dev server against migrated+seeded infra and runs scripts/smoke.sh.
  # A separate job so it does not serialize the fast checks above.
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres: # dev-shaped: smoke runs `make migrate`/`make seed` with the Makefile's default DATABASE_URL
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: bibseller
        ports: ['54320:5432'] # 54320 = the dev-default host port (#159)
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: start minio + mailpit (smoke exercises image storage and email flows)
        # MinIO pinned like docker-compose.yml / compose.prod.yml (D21: the OSS
        # line is archived, so a floating tag is stale anyway). Mailpit floats,
        # matching docker-compose.yml.
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z server /data
          docker run -d --name mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 1
          done
          curl -sf http://localhost:9000/minio/health/live # fail the step if MinIO never came up
          for i in $(seq 1 30); do
            curl -sf http://localhost:8025/api/v1/messages >/dev/null && break || sleep 1
          done
          curl -sf http://localhost:8025/api/v1/messages >/dev/null # fail the step if Mailpit never came up
      - run: npm ci
        working-directory: frontend
      - name: stamp the dev marker (make seed refuses unstamped targets, #159)
        # Locally `make infra` does this via compose exec; the service
        # container has no init hook, so use the runner's psql client.
        run: |
          psql "postgres://postgres:dev@localhost:54320/bibseller" \
            -c "CREATE TABLE IF NOT EXISTS dev_marker (stamped_at timestamptz NOT NULL DEFAULT now())"
      # config.Load() and the Makefile default to this exact local topology
      # (Postgres :54320/bibseller, MinIO :9000, Mailpit :1025/:8025), so no
      # env overrides are needed; the api creates the bucket on boot.
      - run: make smoke
