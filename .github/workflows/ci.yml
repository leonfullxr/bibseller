name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres: # used by the migrations round-trip and integration tests below
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: bibseller_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:dev@localhost:5432/bibseller_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: backend
      - name: migrations round-trip (up -> 0 -> up)
        run: |
          GOOSE="go run github.com/pressly/goose/v3/cmd/goose@v3.27.1"
          $GOOSE -dir db/migrations postgres "$DATABASE_URL" up
          $GOOSE -dir db/migrations postgres "$DATABASE_URL" down-to 0
          $GOOSE -dir db/migrations postgres "$DATABASE_URL" up
      - run: go test ./... # includes schema constraint tests against the migrated service DB
      - name: sqlc generated code is current
        run: |
          go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1 generate
          git diff --exit-code -- internal/platform/db/sqlcgen

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
