# Production stack for the self-host model (docs/DEPLOYMENT.md -> Model A).
# Cloudflare terminates TLS at the edge and reaches Caddy through the tunnel;
# every hop below is plain HTTP on the internal network. Secrets live in
# deploy/.env.prod (gitignored; see .env.prod.example). Driven by the
# `make prod-*` targets, or directly:
#   docker compose --env-file deploy/.env.prod -f deploy/compose.prod.yml up -d --build
#
# Resource limits (#94): prod and staging run this same file on one ~16G box
# (DEPLOYMENT.md "One box, two stacks"), so each stack's limits are sized so TWO
# can coexist. Per-stack steady state ~4.9G (db 2G, minio 1G, api+web 768M each,
# caddy/mail/cloudflared 128M each); x2 ~10G, leaving ~6G for the OS, page cache,
# and the transient migrate one-shot. Memory is the hard boundary -
# it stops a staging OOM from killing prod's Postgres. cpus are ceilings assuming
# a ~4-vCPU box; honored by Compose v2's `docker compose up` (no Swarm).
name: bibseller-prod

# Bound each long-running container's logs (#12 observability). Docker's default
# json-file driver is unbounded, so a crash-loop or verbose spew could fill the
# host disk within an up-window. `make prod-down` removes containers (clearing
# their logs), so this only has to cap a single session: 3 x 10 MiB per service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    logging: *default-logging
    # Postgres memory kept inside the 2G cgroup limit below so a staging rehearsal
    # (a prod dump loaded on the same box) can't OOM-kill prod's backend (#94).
    # max_connections stays well above the pool cap (MaxConns=20, #93) with room
    # for migrations/backups/psql; work_mem x max_connections must fit the cap.
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=8MB
      - -c
      - max_connections=50
      # Query-level observability (#136): collection starts only after a
      # Postgres restart (make prod-down && make prod-up); the extension
      # itself is created by migration 0012. Signal queries: docs/SCALING.md.
      - -c
      - shared_preload_libraries=pg_stat_statements
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [pgdata:/var/lib/postgresql/data]
    # Bound to localhost only so `make prod-migrate` / `prod-backup` can reach it
    # from the host. Never expose Postgres on a public interface. DB_HOST_PORT
    # lets the parallel staging stack pick a non-clashing port (5433); prod=5432.
    ports: ['127.0.0.1:${DB_HOST_PORT:-5432}:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 15

  minio:
    # Pinned: MinIO's OSS edition is archived (no new images); :latest is stale.
    # This is the last published official release. Migration path = R2 or the
    # pgsty/minio fork (CONTEXT D21).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes: [miniodata:/data]
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 3s
      retries: 12

  api:
    build: ../backend
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
    environment:
      ENV: production
      PORT: '8080'
      # libpq keyword/value form (not a postgres:// URL): pgx parses it and it
      # tolerates @ & % etc. in the password without URL-escaping (#64).
      DATABASE_URL: host=db port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable
      SMTP_ADDR: mail:25
      EMAIL_FROM: ${EMAIL_FROM}
      APP_URL: ${PUBLIC_ORIGIN}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    depends_on:
      db: { condition: service_healthy }
      minio: { condition: service_healthy }
    # Healthcheck runs the binary itself (distroless image: no shell/curl).
    # /api/readyz includes DB reachability, which is what dependents care
    # about. Note compose does NOT restart unhealthy containers - the win is
    # startup ordering plus `docker compose ps` visibility during incidents.
    # Corollary: `up` hard-fails dependents if this never turns healthy
    # (~80s: start_period + retries x interval), so a deploy onto a broken
    # DB stops loudly instead of serving a half-up stack.
    healthcheck:
      test: ['CMD', '/api', '-healthcheck']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # One-shot DB migrator (run via `make prod-migrate`; the profile keeps it out
  # of `up`). goose runs against the same keyword/value DATABASE_URL as the api,
  # so compose substitutes the password and it never transits a host shell (#64).
  migrate:
    image: golang:1.25-alpine
    profiles: ['tools']
    # `go run goose` compiles on first use - give it room. Transient (run via
    # `make prod-migrate`), so its 1G is not part of the steady-state budget.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    environment:
      DATABASE_URL: host=db port=5432 user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable
    volumes:
      - ../backend/db/migrations:/migrations:ro
    depends_on:
      db: { condition: service_healthy }
    entrypoint: ['sh', '-c']
    command:
      - go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 -dir /migrations postgres "$$DATABASE_URL" up

  web:
    build:
      context: ../frontend
      # Baked into the build so prod asset URLs are absolute (no path doubling,
      # #66). The image is therefore origin-specific - rebuild if the domain changes.
      args:
        PUBLIC_ORIGIN: ${PUBLIC_ORIGIN}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
    environment:
      NODE_ENV: production
      PORT: '3000'
      # ORIGIN makes url.origin + SvelteKit CSRF correct behind the proxy/tunnel.
      ORIGIN: ${PUBLIC_ORIGIN}
      # Internal address the server-side load functions use to reach the API.
      API_URL: http://api:8080
    depends_on:
      api: { condition: service_healthy }
    # adapter-node has no health route; any HTTP response from the node
    # process (even an SSR error page) means the web server itself is up -
    # api readiness is the api healthcheck's job. node 22+ ships global
    # fetch. 127.0.0.1, not localhost: adapter-node binds 0.0.0.0 (IPv4)
    # and the alpine hosts file maps localhost to ::1 first. Same restart
    # caveat as the api healthcheck.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/', { signal: AbortSignal.timeout(4000) }).then(() => process.exit(0), () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_healthy }
    # No published ports: only cloudflared (same network) reaches caddy:80.

  # Send-only Postfix relay. The app sends plain mail to mail:25 (internal,
  # unauthenticated); Postfix queues and relays it, authenticated over TLS,
  # through the smarthost (residential IPs cannot deliver direct - DEPLOYMENT.md).
  mail:
    image: boky/postfix
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    environment:
      ALLOWED_SENDER_DOMAINS: ${MAIL_SENDER_DOMAIN}
      RELAYHOST: ${MAIL_RELAYHOST}
      RELAYHOST_USERNAME: ${MAIL_RELAYHOST_USERNAME}
      RELAYHOST_PASSWORD: ${MAIL_RELAYHOST_PASSWORD}
      # The app -> Postfix hop is plaintext on the internal network, so do not
      # offer STARTTLS here: the app's Go SMTP client would verify Postfix's
      # self-signed cert against host "mail" and fail. TLS still applies on the
      # Postfix -> Brevo relay hop (the relay config sets smtp_tls_security_level).
      POSTFIX_smtpd_tls_security_level: none
    # The queue surviving blips is the reason Postfix exists at all
    # (DEPLOYMENT.md), so queued-but-undelivered mail must outlive
    # `make prod-down` (containers are removed). queue_directory is
    # /var/spool/postfix (verified: `postconf queue_directory` in this image);
    # the boky entrypoint re-owns the mounted spool on start.
    volumes: [mailspool:/var/spool/postfix]

  # Outbound-only tunnel to Cloudflare's edge: no public IP, no inbound ports.
  # Set the tunnel's public hostname to route to http://caddy:80 in the
  # Cloudflare Zero Trust dashboard.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    depends_on: [caddy]

volumes:
  pgdata:
  miniodata:
  mailspool:
