# Dev infrastructure only - both apps run natively for hot reload.
# See docs/ARCHITECTURE.md -> Dev environment.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: bibseller
    # 54320, not 5432: on the self-host box the PROD stack publishes Postgres
    # on 127.0.0.1:5432 (compose.prod.yml), so dev defaults on the same port
    # would silently target the live database (#159). Staging avoids the same
    # clash via DB_HOST_PORT=5433.
    ports: ['54320:5432']
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bibseller']
      interval: 2s
      timeout: 3s
      retries: 15

  minio: # S3-compatible - mirrors prod object storage locally
    # Pinned to the last published official release (MinIO OSS is archived;
    # :latest is stale). Matches deploy/compose.prod.yml; see CONTEXT D21.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ['9000:9000', '9001:9001'] # 9001 = web console
    volumes: [miniodata:/data]
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 12

  mailpit: # catches all dev email - web UI on :8025
    image: axllent/mailpit
    ports: ['1025:1025', '8025:8025']

volumes:
  pgdata:
  miniodata:
